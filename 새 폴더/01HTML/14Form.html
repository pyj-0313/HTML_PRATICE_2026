<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="wrapper">

        <h2>회원가입</h2>
        <form action="">
            <div>
                <div>
                    <label>기본정보</label>
                    <span>필수 사항</span>
                </div>
                <div>
                    <input type="text" placeholder="이메일" />
                </div>
                <div>
                    <input type="password" placeholder="비밀번호" />
                </div>
                <div>
                    <input type="password" placeholder="비밀번호 확인" />
                </div>
            </div>
            <div>
                <div>
                    <label>닉네임</label>
                    <span>선택 사항</span>
                </div>
                <div>
                    <input type="text" placeholder="닉네임" />
                </div>
                <div>
                    <input type="file" />
                </div>
            </div>
            <div>
                <div>
                    <label>전화번호</label>
                    <span>선택 사항</span>
                </div>
                <div>
                    <select>
                        <option value="">010</option>
                        <option value="">011</option>
                    </select>
                    <input placeholder="휴대폰 번호를 입력해주세요." />
                </div>
            </div>
            <div>
                <div>
                    <label>생일</label>
                    <span>선택 사항</span>
                </div>
                <div>
                    <select>
                        <option value="">1998년</option>
                        <option value="">1999년</option>
                    </select>
                    <select>
                        <option value="">1월</option>
                        <option value="">2월</option>
                    </select>
                    <select>
                        <option value="">1일</option>
                        <option value="">2일</option>
                    </select>
                </div>
            </div>
            <div>
                <button>회원가입</button>
            </div>
        </form>

    </div>

</body>

</html>
