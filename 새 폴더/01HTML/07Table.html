<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        table{
            border-collapse: collapse;
        }
        td,th{
            text-align: center;
            width:55px;
            height:55px;
            border : 1px solid;
        }
    </style>

</head>
<body>
    
    <!-- 기본 -->
    <table>
        <tr>
            <th>열이름1</th>
            <th>열이름2</th>
            <th>열이름3</th>
        </tr>
        <tr>
            <td>값1</td>
            <td>값2</td>
            <td>값3</td>
        </tr>
        <tr>
            <td>값1</td>
            <td>값2</td>
            <td>값3</td>
        </tr>
        <tr>
            <td>값1</td>
            <td>값2</td>
            <td>값3</td>
        </tr>
    </table>
    <hr/>
    <!-- rowspan -->
    <table>
        <caption>ROWSPAN</caption>
        <tr>
            <td rowspan="2">1</td>
            <td>2</td>
            <td>3</td>
            <td rowspan="3">4</td>
        </tr>
        <tr>
            <!-- <td>5</td> -->
            <td rowspan="2">6</td>
            <td>7</td>
            <!-- <td>8</td> -->
        </tr>
        <tr>
            <td>9</td>
            <!-- <td>10</td> -->
            <td>11</td>
            <!-- <td>12</td> -->
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
            <td>16</td>
        </tr>
    </table>

    <hr/>

    <!-- colspan -->
    <table>
        <caption>COLSPAN</caption>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td colspan="3">10</td>
            <!-- <td>11</td> -->
            <!-- <td>12</td> -->
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
            <td>16</td>
        </tr>
    </table>


</body>
</html>
