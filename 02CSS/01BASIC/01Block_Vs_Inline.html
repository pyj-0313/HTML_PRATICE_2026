<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width:200px;
            height:250px;
            border:1px solid;
            margin:10px;
            padding:10px;
            display:inline;
        }
        span{
            width:200px;
            height:250px;
            border:1px solid;
            margin:10px;
            padding : 10px;
            /* display:block; */
            display:inline-block;
        }
    </style>

</head>
<body>
    <!--
        블럭형태그(ex.div) : 1행 전체를 사용하는 태그
        width : o , height : o, margin : o , padding : o
        인라인태그(ex.span): 1행 공유 태그
        width : x , height : x, margin : left,right, padding : o
     -->
    <div>HELLO WORLD</div>
    <div>HELLO WORLD</div>
    <hr/>
    <span>HELL WORLD</span>
    <span>HELL WORLD</span>
</body>
</html>
