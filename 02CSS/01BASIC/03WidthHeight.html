<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            background-color: orange;
            /* height:300px; */
            /* width:200px; */
            min-width:300px;
            max-width:1200px;
            min-height:500px;
            max-height:700px;
        }
        .son{
            background-color: royalblue;
            height:150px;
        }
    </style>
</head>
<body>
    <!-- 
        width : auto(기본값 : 최대너비를 가지려는 성질)
        height : auto(기본값 : 최소높이를 가지려는 성질 )
        
        min-width : 최소너비
        max-width : 최대너비
        min-height : 최소높이
        max-height : 최대높이
    -->
    <div class="parent">
        <div class="son"></div>
    </div>
</body>
</html>
