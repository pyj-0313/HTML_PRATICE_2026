<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{height:100px;background-color: orange;}
        div>div{background-color: royalblue;height:50px;}
    </style>
</head>
<body>
    <!-- px : 고정크기 -->
    <div style="width:500px;">
        <div style="width:700px;"></div>
    </div>
    <hr/>
    <!-- % : 가변크기, 상위태그 기준 -->
    <div style="width:300px;">
        <div style="width:50%;"></div>
    </div>
    <hr/>
    <!-- vw,vh : 가변크기 , Viewport를 기준 -->
    <div style="width:500px;">
        <div style="width:50vw"></div>
    </div>
</body>
</html>
