<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        div {
            width: 300px;
            height: 300px;
            background-color: orange;
        }

        .d1 {
            /* all direction 동일 */
            /* margin:20px; */

            /* top,bottom:20px  left,right:40px */
            /* margin : 20px 40px; */

            /* top : 10px , right,left:20px ,  bottom : 30px ,  */
            /* margin : 10px 20px 30px; */

            /* top : 10px , right : 20px , bottom : 30px , left : 40px */
            /* margin : 10px 20px 30px 40px; */

            margin-top: 10px;
            margin-right: 20px;
            margin-bottom: 30px;
            margin-left: 40px;
        }

        /* body{border : 1px solid;width:1280px; margin:0 auto;} */
        /* 1.가운데맞추기 - margin : 0 auto */
        .d2 {
            margin: 50px auto;
        }

        /* 2.가운데맞추기 - display:flex (LAYOUT) */
        .parent1 {
            height: 250px;
            width: 80vw;
            margin: 0 auto;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .son {
            background-color: royalblue;
            width: 150px;
            height: 150px;
            border: 1px solid;
        }

        /* 3.가운데맞추기 : position */
        .parent2 {
            height: 250px;
            width: 80vw;
            margin: 0 auto;
            /*  */
            position:relative;
        }
        .parent2>.son{
            position:absolute;
            left:0;
            right:0;
            top:0;
            bottom:0;
            margin:auto;
        }
    </style>
</head>

<body>

    <div class="d1">HELLO WORLD</div>
    <hr />
    <div class="d2">HELLO WORLD</div>
    <hr />
    <div class="d3 parent1">
        <div class="son son1"></div>
        <div class="son son2"></div>
    </div>
    <hr />
    <div class="d3 parent2">
        <div class="son son1"></div>
    </div>

</body>

</html>
