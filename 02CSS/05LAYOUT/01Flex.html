<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }

        .wrapper {
            width: 1440px;
            /* height:950px; */
            margin: 0 auto;
            border: 1px solid;
            padding: 10px;
        }

        .wrapper>.parent1 {
            height: 350px;
            border: 1px solid;
            /* display */
            display: flex;

            /* 방향설정  flex-direction:row,column,row-reverse,column-reverse*/
            flex-direction: row;
            /*
                배치설정(row : 수평배치,column:수직배치) 
                justify-content :  
                option : left,right,center,space-between,space-evenly space-around,end
                
            */
            justify-content: center;
            /* 
                배치설정(row : , column : )
                align-items : 
                option : start,end,center,stretch
            */
            align-items: center;
            /* 
                사이간격 gap
            */
            gap: 20px;
            margin-bottom: 20px;
        }

        .wrapper>.parent1>.son {
            /* height : 40px; */
            width: 200px;
            border: 1px solid;
        }

        .wrapper>.parent2 {
            /* border: 1px solid; */
            width: 1280px;
            padding: 10px 15px;
            margin: 0 auto;
            display: flex;
            /* 
                한행에 모든 자식요소 포함여부 
                flex-wrap : no-wrap(1행내에 모든자식 포함), wrap(다음행으로 표시)
             */
            flex-wrap:wrap;
            justify-content: flex-start;

            gap: 10px;
            /* padding:10px; */
            background-color: orange;

        }

        .wrapper>.parent2>.son {
            /* width:200px; */
            width: 200px;
            height: 200px;
            /* border: 1px solid; */
            background-color: beige;

            
            display:flex;
            justify-content: center;
            align-items:center;
            font-size : 2rem;
            color : royalblue;
        }
    </style>
</head>

<body>


    <div class="wrapper">
        <div class="parent1">
            <div class="son">1</div>
            <div class="son">2</div>
            <div class="son">3</div>
            <div class="son">4</div>
            <div class="son">5</div>
        </div>
        <div class="parent2">
            <div class="son">1</div>
            <div class="son">2</div>
            <div class="son">3</div>
            <div class="son">4</div>
            <div class="son">5</div>
            <div class="son">6</div>
            <div class="son">7</div>
            <div class="son">8</div>
            <div class="son">9</div>
            <div class="son">10</div>
            <div class="son">11</div>
            <div class="son">12</div>
            <div class="son">13</div>
            <div class="son">14</div>
            <div class="son">15</div>
            <div class="son">16</div>
            <div class="son">17</div>
            <div class="son">18</div>
            <div class="son">19</div>
            <div class="son">20</div>
        </div>
    </div>
</body>

</html>
