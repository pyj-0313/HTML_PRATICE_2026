<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        div{
            width:100px;
            height:500px;
            border:1px solid;
            margin:10px 30px;
            display:inline-block;
        }
        img{
            width:100%;height:100px;
            border:1px solid gray;
            position:relative;
            left:0;
            top:0;
            transition: 3s;
        }
        div:hover img{
            top:400px;
            transition: .5s;
        }

    </style>
</head>
<body>
    
    <div><img src="https://marketplace.canva.com/MetX8/MAGaIGMetX8/1/tl/canva-cute-puppy-illustration-MAGaIGMetX8.png" alt=""></div>
    <div><img src="https://www.shutterstock.com/image-illustration/cat-cartoon-cute-illustration-design-260nw-2205942997.jpg" alt=""></div>
    <div><img src="https://media.istockphoto.com/id/1195743934/ko/%EB%B2%A1%ED%84%B0/%EA%B7%80%EC%97%AC%EC%9A%B4-%ED%8C%AC%EB%8D%94-%EC%BA%90%EB%A6%AD%ED%84%B0-%EB%B2%A1%ED%84%B0-%EB%94%94%EC%9E%90%EC%9D%B8.jpg?s=612x612&w=0&k=20&c=2wbxrClDovLVGF3EC7rLGIEzemxl6d-YZJmD-1A_0cc=" alt=""></div>
</body>
</html>
