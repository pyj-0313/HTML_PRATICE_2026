<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        body{
            margin: 0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        
        .container{
            width:100px;
            height:100px;
            background-color: orange;
        }

        .container>.item{
            width:100px;
            height:100px;
            background-color: royalblue;
            transition: 2s;
        }

        .container:hover>.item{
            transform:perspective(100px) rotateY(180deg)
        }

    </style>
</head>
<body>

        <div class="container">
            <div class="item"></div>
        </div>
    
</body>
</html>
