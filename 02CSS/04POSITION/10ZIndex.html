<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        body{margin: 0; padding:0;}
        .parent{width:500px;height:500px;background-color: orange;}
        .son{width:100px;height:100px;background-color: royalblue;border:1px solid;}
        .son:nth-child(1){
            position:relative;
            z-index:5;
        }
        .son:nth-child(2){
            position:relative;
            top:-20px;
            left:20px;
        }
    </style>
</head>
<body>
    
        <div class="parent">
            <div class="son">1</div>
            <div class="son">2</div>
            <div class="son">3</div>
            <div class="son">4</div>
        </div>
</body>
</html>
