        .wrapper>main>section.main-banner>.swiper>.swiper-button-next::after {

        .start-stop-toggle {

            top: 575px;
            left: calc(25% - 55px);
            cursor: pointer;
            color: white;
            z-index: 1;
            transition: .4s;

        .swiper-pagination-current {

        main>.multi-slider>.swiper>.swiper-wrapper>.swiper-slide {

            border: 1px solid;

        main>.multi-slider>.swiper>.swiper-wrapper>.swiper-slide-active {
            background-color: orange;
            transform: scale(1.5);
            z-index: 2;
        }

        main>.multi-slider>.swiper>.swiper-wrapper>.swiper-slide-prev {
            background-color: orange;

        }

        main>.multi-slider>.swiper>.swiper-wrapper>.swiper-slide-next {

        }

        main>.multi-slider>.swiper>.swiper-wrapper>.swiper-slide>a>img {}

        main>.multi-slider>.swiper>.swiper-button-prev {}

        main>.multi-slider>.swiper>.swiper-button-next {}

        .wrapper>footer {

            background-color: black;

    <script>
        const mainBannerSwiper = new Swiper('.main-banner>.swiper', {
            // Optional parameters
            direction: 'horizontal',  //vertical:수직 , horizontal(수평)
            autoplay: {
                delay: 2000,
                // pauseOnMouseEnter:true,
            },
            loop: true,
            effect: "slide", // slide(기본), fade , scroll, cube , coverflow , flip
            mousewheel: true,

            // If we need pagination
            pagination: {
                el: '.main-banner>.swiper>.swiper-pagination',
                clickable: true,
                type: 'fraction', //bullets(기본), fraction , progressbar
            },

            // Navigation arrows
            navigation: {
                nextEl: '.main-banner>.swiper>.swiper-button-next',
                prevEl: '.main-banner>.swiper>.swiper-button-prev',
            },

            // And if we need scrollbar
            // scrollbar: {
            //     el: '.swiper-scrollbar',
            // },
        });

        console.log(mainBannerSwiper);

        const playToggleBtn = document.querySelector('.start-stop-toggle span');
        let isPlay = true;
        playToggleBtn.addEventListener('click', () => {

            if (isPlay) {
                playToggleBtn.innerHTML = 'pause';
                isPlay = false;
                mainBannerSwiper.autoplay.stop();
            }
            else {
                playToggleBtn.innerHTML = 'play_arrow';
                isPlay = true;
                mainBannerSwiper.autoplay.start();
            }

        });


        //Top-header Vertical Swiper
        const topHeaderSwiper = new Swiper('.top-header>.swiper', {
            // Optional parameters
            direction: 'vertical',
            autoplay: {
                delay: 2000,
            },
            loop: true,
        });

        //Multi-Silder Swiper
        const multiSliderSwiper = new Swiper('main>.multi-slider>.swiper', {
            // Optional parameters
            direction: 'horizontal',
            loop: true,
            autoplay: {
                delay: 2000
            },
            // multislider option
            slidesPerView: 4,
            centeredSlides: true,
            // spaceBetween : 20,

            // Navigation arrows
            navigation: {
                nextEl: 'main>.multi-slider>.swiper>.swiper-button-next',
                prevEl: 'main>.multi-slider>.swiper>.swiper-button-prev',
            },

        });

        // MultiSlider Mouse Event
        const multiSliderEl = document.querySelector('main>.multi-slider>.swiper');
        multiSliderEl.addEventListener('mouseover', () => { multiSliderSwiper.autoplay.stop(); });

        multiSliderEl.addEventListener('mouseleave', () => { multiSliderSwiper.autoplay.start(); });

        //
        // MultiSlider 주변 slide 클릭시 중심위치 이동
        let allSwiperSilder = document.querySelectorAll('.multi-slider .swiper .swiper-slide')//배열OBJECT반환
        allSwiperSilder = Array.from(allSwiperSilder)
        allSwiperSilder.forEach(item => {

            item.addEventListener('click', () => {
                let idx = -1
                if (!item.classList.contains('swiper-slide-active')) {
                    //클릭한 swiper-slide가 active가 아닌경우
                    allSwiperSilder.forEach(el => {
                        el.classList.remove('swiper-slide-active');
                        el.classList.remove('swiper-slide-prev')
                        el.classList.remove('swiper-slide-next')
                    })
                    item.classList.add('swiper-slide-active')
                    idx = Array.from(allSwiperSilder).indexOf(item);
                    console.log('idx', idx)
                    if (idx === 0) {
                        //슬라이드중 첫번째
                        allSwiperSilder[allSwiperSilder.length - 1].classList.add('swiper-slide-prev')
                        allSwiperSilder[idx + 1].classList.add('swiper-slide-next')
                    }
                    else if (idx == allSwiperSilder.length - 1) {
                        //슬라이드중 마지막번째
                        allSwiperSilder[idx - 1].classList.add('swiper-slide-prev')
                        allSwiperSilder[0].classList.add('swiper-slide-next')
                    }
                    else {
                        allSwiperSilder[idx - 1].classList.add('swiper-slide-prev')
                        allSwiperSilder[idx + 1].classList.add('swiper-slide-next')
                    }
                    multiSwiper.slideTo(idx);
                }
            })
        })

    </script>
