<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- SCROLLMAGIC CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.8/ScrollMagic.min.js"
        integrity="sha512-8E3KZoPoZCD+1dgfqhPbejQBnQfBXe8FuwL4z/c8sTrgeDMFEnoyTlH3obB4/fV+6Sg0a0XF+L/6xS4Xx1fUEg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        section {
            width: 1280px;
            margin: 0 auto;
            height: 800px;
            border: 1px solid;
            margin-bottom: 20px;
            position: relative;
        }

        .ball {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            border: 1px solid;

            position: absolute;
            left: 0;
            top: 0;
            transition: .5;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .move{
            left:calc(100% - 100px);
            top:calc(100% - 100px);

            transform: rotate(180deg);background-color: black;color:white;
            transition: 2s;
        }

            /* animation-name : ball;
            animation-iteration-count: infinite;
            animation-duration: 1s; */
        /* @keyframes ball {
            from{transform: rotate(0deg);background-color: white;color:black;} */
            /* to{transform: rotate(180deg);background-color: black;color:white;} */
        
    </style>
</head>


<body>

    <section></section>
    <section class="scroll-section scroll-spy">
        <div class="ball">BALL</div>
    </section>
    <section></section>



    <script>
        //노드검색
        const spyedEl = document.querySelector('.scroll-spy');
        const ballEl = document.querySelector('.ball');
        //스크롤 매직 객체
        new ScrollMagic
            .Scene({                                     //감시 위치 옵션
                triggerElement:spyedEl,                  //감시할 요소
                triggerHookL:0.5,                        //스크롤 위치값(0-1,0:최상단, .5:중앙, 1:최하단)
            })                                           

            .setClassToggle(ballEl,'move')                            //애니메이션 효과 적용
            .addTo(new ScrollMagic.Controller());        //제어부(스크롤 상황 감시)

    </script>


</body>

</html>
