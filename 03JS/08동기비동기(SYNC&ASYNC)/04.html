<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 1280px;
            height: 800px;
            border: 1px solid;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
        }

        .box>.main-thread {
            width: 300px;
            border: 1px solid;
            height: 100%;
        }

        .box>.sub1-thread {
            width: 300px;
            border: 1px solid;
            height: 100%;
        }

        .box>.sub2-thread {
            width: 300px;
            border: 1px solid;
            height: 100%;
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="main-thread"></div>
        <div class="sub1-thread"></div>
        <div class="sub2-thread"></div>
    </div>

    <script>
        const mainThreadEl = document.querySelector('.main-thread');
        const sub1ThreadEl = document.querySelector('.sub1-thread');
        const sub2ThreadEl = document.querySelector('.sub2-thread');

        // Promise 비동기 처리 객체
        // new Promise((resolve,reject)=>{
        //     //비동기처리로직
        //     setTimeout(()=>{
        //         const isSuccess =false;
        //         if(isSuccess){
        //             resolve("작업 성공! : 서버로부터 데이터 수신완료!");
        //         }else{
        //             reject("작업 실패 : 문제상황확인 해보세요~..");
        //         }
        //     },3000);
        // })
        // .then((response)=>{console.log("response",response)})   //비동기 작업 성공시(resolve)
        // .catch((error)=>{console.error("error",error)})         //비동기 작업 실패시(reject)

        let cnt = 0;
        setInterval(() => { mainThreadEl.innerHTML += `MAIN THREAD...${cnt++}<br/>` }, 1000);

        //비동기 기본 함수 
        function sub_process_executor(val) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve(val)
                }, 2000)
            })
        }
        //비동기 함수 실행
        // sub_process_executor(11).then((response)=>{
        //     console.log('sub1',response);
        //     sub1ThreadEl.innerHTML+=`sub1...${response}`;
        // }).catch((error)=>{})

        // sub_process_executor(22).then((response)=>{
        //     console.log('sub2',response);
        //     sub2ThreadEl.innerHTML+=`sub2...${response}`;
        // }).catch((error)=>{})

        // Async / Await 를 이용한 비동기 처리로직 순서 배치

        async function sub_process_order() {
           
            await sub_process_executor(22).then((response) => {
                console.log('sub2', response);
                sub2ThreadEl.innerHTML += `sub2...${response}`;
            }).catch((error) => { })

            await sub_process_executor(11).then((response) => {
                console.log('sub1', response);
                sub1ThreadEl.innerHTML += `sub1...${response}`;
            }).catch((error) => { })

        }
        sub_process_order();

    </script>

</body>

</html>
