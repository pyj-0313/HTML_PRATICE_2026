<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!--  -->
    <h1>MYCAR</h1>
    <div>
        <h2>속성</h2>
    </div>
    <div>
        <label>owner</label> <input id="owner" value="" readonly />
    </div>
    <div>
        <label>category</label> <input id="category" readonly />
    </div>
    <div>
        <label>fuleType</label> <input id="fuleType" readonly />
    </div>
    <div>
        <label>curSpeed</label> <input id="curSpeed" readonly />
    </div>
    <div>
        <label>fuelAmount</label> <input id="fuelAmount" readonly />
    </div>
    <div>
        <button onClick="myCar.Accel()">가속</button>
        <button onClick="myCar.Break()">감속</button>
        <button onClick="myCar.toString()">상태확인</button>
    </div>
    <div>
        <label>속도</label>
        <div id="gauge" style="transition:.2s;height:50px;width:1px;background-color: orange;"></div>
    </div>

    <hr>

    <!--  -->
    <script>
        // Object ? 사물,객체 {key:value,key:value}
        // 속성 :
        // 기능 : 

        // MyCar : 
        // 속성 : 소유자,브랜드명,속도,연료타입,연료량...
        // 기능 : 가속하다,감속하다,시동을건다, 시동을 끈다...
        const myCar =
        {
            // 속성
            owner: "홍길동",
            category: "SUV",
            fuleType: "디젤",
            curSpeed: 0,
            fuelAmount: 100,
            //기능
            Accel: function () {
                this.curSpeed += 10;
                console.log("가속처리 완료. 현재속도 : ", this.curSpeed)
                document.getElementById('gauge').style.width = `${this.curSpeed * 2}px`;
                document.getElementById('curSpeed').value = this.curSpeed;
            },
            Break: function () {
                this.curSpeed -= 10;
                console.log("감속처리 완료. 현재속도 : ", this.curSpeed);
                document.getElementById('gauge').style.width = `${this.curSpeed * 2}px`;
                document.getElementById('curSpeed').value = this.curSpeed;
            },
            toString: function () {
                console.log(this.owner, this.category, this.fuleType, this.curSpeed, this.fuelAmount);
            }
        };
        console.log(myCar);
        document.getElementById('owner').value = myCar.owner;
        document.getElementById('category').value = myCar.category;
        document.getElementById('fuleType').value = myCar.fuleType;
        document.getElementById('curSpeed').value = myCar.curSpeed;
        document.getElementById('fuelAmount').value = myCar.fuelAmount;

        // 
        const tori =
        {
            // 속성
            name : "토리",
            kind : "믹스견",
            age : 2,
            weight : 4.8,
            // 기능
            sound : function(){console.log(`${this.name} 가 멍멍 짖습니다!`);},
            toString : function(){console.log(this.name,this.kind,this.age,this.weight);}
        }
        
        // console.log(tori);
        //tori.toString();
        tori["color"] = "검정";
        console.log("!",tori);
        tori.sound();

    </script>
</body>

</html>
