<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .ball{
            border:1px solid gray;
            width: 50px;
            height:50px;
            border-radius: 50%;
            position:absolute;
            left:0;
            top:0;
            right:0;
            bottom:0;
            margin:auto;
            transition: .5s;
        }
        .ball-1280px{width:500px;height:500px;background-color: orange;}

        .ball-860px{width:250px;height:250px;background-color: royalblue;}

        .ball-380px{width:70px;height:70px;background-color: green;}
    </style>
</head>
<body>
    
    <div class="ball ball-1280px"></div>

    <script>
        const ballEl = document.querySelector('.ball');

        window.addEventListener('resize',()=>{
            console.log("window.outerWidth",window.outerWidth);
            // console.log("window.outerHeight",window.outerHeight);
            
            // console.log("window.innerWidth",window.innerWidth);
            // console.log("window.innerHeight",window.innerHeight);

            if(window.outerWidth>=1280){
                ballEl.classList.remove('ball-860px','ball-380px')
                ballEl.classList.add('ball-1280px')
            }
            else if(window.outerWidth>=380)    //380<=window.outerWidth < 1280
            {
                ballEl.classList.remove('ball-1280px','ball-380px')
                ballEl.classList.add('ball-860px')
            }
            else
            {
                ballEl.classList.remove('ball-1280px','ball-860px')
                ballEl.classList.add('ball-380px')
            }



        });
    </script>

</body>
</html>
