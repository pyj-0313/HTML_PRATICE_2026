        var x = 'global x'; //전역스코프(Window : var 사용시 저장되는 전역스코프)
        let n1 = 10;        //전역스코프(Declarative Environment Recode(Script 스코프) : const,let 시 저장되는 전역스코프 )
        console.log(window.x);
        console.log(window.n1); //x

        //Outer 함수내의 지역 스코프
        function outer(){
            var x = 'outer.x';
            var y = 0;
            console.log('outer x', x);
            console.log('outer y', y);
            
            // inner 함수 내의 지역 스코프
            function inner(){
                var x = 'inner x';
                console.log('inner x',x);

                // if 블록 지역 스코프
                if(true){
                    console.log('x',x);
                    var x = "if x";
                    console.log('x',x);
                }
            }
            inner();

        }
        outer();
