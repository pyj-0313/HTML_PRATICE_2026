<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <ul>
        <li>LIST_1</li>
        <li id="li2">LIST_2</li>
        <li class="item">LIST_3</li>
        <li>LIST_4</li>
        <li id="li5">LIST_5</li>
        <li>LIST_6</li>
        <li>LIST_7</li>
        <li class="item">LIST_8</li>
        <li class="item">LIST_9</li>
        <li class="item">LIST_10</li>
    </ul>

    <script>
        //노드탐색
        //id
        const li2El = document.getElementById('li2');
        li2El.style.fontSize="2rem";
        li2El.setAttribute("style","color:red;background-color:black");

        //selector
        const li2El_2 = document.querySelector('#li2');
        li2El_2.style.width="200px";
        li2El_2.style.border="1px solid";

        const itemEl = document.querySelector('.item');
        itemEl.style.color="green";
        itemEl.style.fontWeight="800";

        const itemsEl = document.querySelectorAll('.item');
        console.log(itemsEl);
        itemsEl.forEach((item)=>{
            item.style.backgroundColor="orange";
        })
        
        //tagName
        let liEls = document.getElementsByTagName('li');
        console.log(liEls);
        //유사배열 -> 배열화
        console.log(Object.entries(liEls))
        console.log(Array.from(liEls))

        liEls  = Array.from(liEls);
        liEls.forEach((item)=>{
            item.style.fontSize="2rem";
        })

    </script>

</body>
</html>
